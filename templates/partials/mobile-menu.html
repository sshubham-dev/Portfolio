{% block mobile_menu %}
<!-- Background Content Mockup (to show blur effect) -->
<div class="fixed inset-0 z-0 p-gutter opacity-20 pointer-events-none">
  <div class="max-w-container-max mx-auto h-full flex flex-col gap-lg">
    <div
      class="h-64 w-full bg-surface-container rounded-lg border border-outline-variant"
    ></div>
    <div class="grid grid-cols-2 gap-md h-96">
      <div
        class="bg-surface-container rounded-lg border border-outline-variant"
      ></div>
      <div
        class="bg-surface-container rounded-lg border border-outline-variant"
      ></div>
    </div>
    <div
      class="h-32 w-full bg-surface-container rounded-lg border border-outline-variant"
    ></div>
  </div>
</div>
<!-- Mobile Navigation Overlay -->
<div
  class="hidden fixed inset-0 z-50 flex items-end md:items-stretch justify-center md:justify-end"
  id="mobile-menu"
>
  <!-- Backdrop -->
  <div
    id="mobile-menu-overlay"
    class="absolute inset-0 bg-surface-dim/80 nav-backdrop transition-opacity duration-300"
  ></div>
  <!-- Menu Panel -->
  <div
    class="relative w-full h-full md:max-w-sm bg-surface-container-low border-l border-outline-variant flex flex-col shadow-2xl overflow-hidden transition-transform duration-500 ease-out translate-x-0"
  >
    <!-- Header Section -->
    <div
      class="flex justify-between items-center h-16 px-gutter border-b border-outline-variant"
    >
      <span class="font-code-md text-code-md font-bold text-primary"
        >SHUBHAM_KUMAR</span
      >
      <button
        class="w-10 h-10 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors duration-200"
        id="mobile-menu-close"
      >
        <span class="material-symbols-outlined" data-icon="close">close</span>
      </button>
    </div>
    <!-- Terminal Status Line -->
    <div
      class="bg-surface-container-highest px-gutter py-2 flex items-center justify-between"
    >
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-primary animate-pulse"></div>
        <span class="font-code-md text-[10px] text-primary tracking-widest"
          >SYSTEM_STABLE // NAV_ACTIVE</span
        >
      </div>
      <span class="font-code-md text-[10px] text-on-surface-variant"
        >v2.4.0_STABLE</span
      >
    </div>
    <!-- Navigation Links -->
    <nav class="flex-grow flex flex-col justify-center px-gutter gap-sm py-xl">
      <!-- Home (Active) -->
      <a
        class="group flex items-baseline gap-md py-md transition-all duration-300 border-b border-transparent hover:border-primary/20"
        href="/"
      >
        <span
          class="font-code-md text-code-md text-primary opacity-50 group-hover:opacity-100"
          >01.</span
        >
        <span
          class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold"
          >Home</span
        >
        <span
          class="material-symbols-outlined ml-auto text-primary text-sm"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >chevron_right</span
        >
      </a>
      <!-- About -->
      <a
        class="group flex items-baseline gap-md py-md transition-all duration-300 border-b border-transparent hover:border-primary/20"
        href="/about"
      >
        <span
          class="font-code-md text-code-md text-on-surface-variant group-hover:text-primary transition-colors"
          >02.</span
        >
        <span
          class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface font-medium group-hover:text-primary transition-colors"
          >About</span
        >
      </a>
      <!-- Projects -->
      <a
        class="group flex items-baseline gap-md py-md transition-all duration-300 border-b border-transparent hover:border-primary/20"
        href="/products"
      >
        <span
          class="font-code-md text-code-md text-on-surface-variant group-hover:text-primary transition-colors"
          >03.</span
        >
        <span
          class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface font-medium group-hover:text-primary transition-colors"
          >Products</span
        >
      </a>
      <!-- Blog -->
      <a
        class="group flex items-baseline gap-md py-md transition-all duration-300 border-b border-transparent hover:border-primary/20"
        href="/blogs"
      >
        <span
          class="font-code-md text-code-md text-on-surface-variant group-hover:text-primary transition-colors"
          >04.</span
        >
        <span
          class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface font-medium group-hover:text-primary transition-colors"
          >Blog</span
        >
      </a>
    </nav>
    <!-- Bottom Actions -->
    <div
      class="p-gutter flex flex-col gap-md border-t border-outline-variant bg-surface-container"
    >
      <a
        class="w-full h-14 bg-primary-container text-on-primary-container font-label-sm text-label-sm flex items-center justify-center gap-sm active:scale-95 transition-all duration-100 hover:brightness-110"
        href="/hire-me"
      >
        <span class="material-symbols-outlined" data-icon="mail">mail</span>
        Hire Me
  </a>
      <!-- Metadata / Footer Info -->
      <div class="flex justify-between items-center pt-sm">
        <div class="flex gap-md">
          <a
            class="text-on-surface-variant hover:text-primary transition-colors"
            href="#"
          >
            <span
              class="material-symbols-outlined text-[20px]"
              data-icon="terminal"
              >terminal</span
            >
          </a>
          <a
            class="text-on-surface-variant hover:text-primary transition-colors"
            href="#"
          >
            <span class="material-symbols-outlined text-[20px]" data-icon="link"
              >link</span
            >
          </a>
        </div>
        <p class="font-code-md text-[10px] text-on-surface-variant uppercase">
          © 2026 Shubham Kumar - Building toward Full Stack AI Engineer
        </p>
      </div>
    </div>
    <!-- Terminal Glitch Effect Aesthetic -->
    <div
      class="absolute bottom-0 left-0 w-full h-[2px] bg-primary/20 overflow-hidden"
    >
      <div
        class="h-full bg-primary w-1/3 animate-[slide_2s_infinite_linear]"
        style="animation: slide 3s infinite linear"
      ></div>
    </div>
  </div>
</div>
{% endblock %}
