<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{{title}}</title>
    <script
      src="https://cdn.tailwindcss.com?plugins=forms,container-queries"
      loading="lazy"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@500;600;700&amp;display=swap"
      rel="stylesheet"
      loading="lazy"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
      loading="lazy"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
      loading="lazy"
    />
    <script id="tailwind-config" loading="lazy">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#d5e3fd",
              tertiary: "#b9c7e0",
              "primary-fixed": "#acedff",
              "on-primary-fixed": "#001f26",
              secondary: "#bcc7de",
              "on-primary-fixed-variant": "#004e5c",
              "surface-container-lowest": "#060e20",
              "inverse-primary": "#00687a",
              "surface-tint": "#4cd7f6",
              "secondary-fixed-dim": "#bcc7de",
              "on-error": "#690005",
              primary: "#4cd7f6",
              "on-tertiary-container": "#2f3d50",
              surface: "#0b1326",
              "secondary-container": "#3e495d",
              "on-secondary-container": "#aeb9d0",
              "tertiary-container": "#99a7bf",
              "error-container": "#93000a",
              "on-surface": "#dae2fd",
              "surface-dim": "#0b1326",
              "on-error-container": "#ffdad6",
              "surface-container": "#171f33",
              "surface-bright": "#31394d",
              "primary-container": "#06b6d4",
              "surface-container-highest": "#2d3449",
              "on-surface-variant": "#bcc9cd",
              "on-tertiary-fixed": "#0d1c2f",
              "on-primary": "#003640",
              "inverse-on-surface": "#283044",
              "on-secondary-fixed": "#111c2d",
              "outline-variant": "#3d494c",
              background: "#0b1326",
              "surface-container-low": "#131b2e",
              "surface-container-high": "#222a3d",
              "on-background": "#dae2fd",
              outline: "#869397",
              "surface-variant": "#2d3449",
              "on-tertiary-fixed-variant": "#3a485c",
              "on-secondary-fixed-variant": "#3c475a",
              "tertiary-fixed-dim": "#b9c7e0",
              "on-secondary": "#263143",
              error: "#ffb4ab",
              "on-primary-container": "#00424f",
              "inverse-surface": "#dae2fd",
              "secondary-fixed": "#d8e3fb",
              "on-tertiary": "#233144",
              "primary-fixed-dim": "#4cd7f6",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            spacing: {
              "container-max": "1200px",
              gutter: "24px",
              lg: "24px",
              sm: "8px",
              xs: "4px",
              md: "16px",
              xl: "48px",
              base: "4px",
            },
            fontFamily: {
              "headline-lg-mobile": ["Inter"],
              "code-md": ["JetBrains Mono"],
              "headline-lg": ["Inter"],
              "headline-md": ["Inter"],
              "headline-xl": ["Inter"],
              "body-lg": ["Inter"],
              "body-md": ["Inter"],
              "label-sm": ["JetBrains Mono"],
            },
            fontSize: {
              "headline-lg-mobile": [
                "28px",
                { lineHeight: "1.2", fontWeight: "700" },
              ],
              "code-md": ["14px", { lineHeight: "1.5", fontWeight: "500" }],
              "headline-lg": [
                "32px",
                {
                  lineHeight: "1.2",
                  letterSpacing: "-0.01em",
                  fontWeight: "700",
                },
              ],
              "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
              "headline-xl": [
                "48px",
                {
                  lineHeight: "1.1",
                  letterSpacing: "-0.02em",
                  fontWeight: "800",
                },
              ],
              "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
              "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
              "label-sm": [
                "12px",
                { lineHeight: "1", letterSpacing: "0.05em", fontWeight: "600" },
              ],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/static/css/style.css" loading="lazy" />
  </head>
  <body
    class="bg-background text-on-background font-body-md selection:bg-primary selection:text-on-primary"
  >
    {% include 'partials/navbar.html' %} {% include "partials/mobile-menu.html"
    %} {% block content %} {% endblock %} {% include 'partials/footer.html' %}
    <script src="/static/js/script.js" loading="lazy"></script>
    <script src="/static/js/mobile-menu.js" loading="lazy"></script>
  </body>
</html>
